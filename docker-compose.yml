# Full-stack deployment: SQL Server + .NET API + nginx (Angular SPA).
#
# Prerequisites:
#   - This repo (alon-project-frontend) and the backend repo (AlonProject)
#     are checked out as sibling folders — the api build context is ../AlonProject.
#   - Copy .env.docker.example to .env and fill in the values.
#
# Run:  docker compose up --build
# Open: http://localhost:8080

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build:
      context: ../AlonProject
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SqlServer: "Server=db;Database=AlonInventoryDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;Encrypt=False;"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: AlonProject
      Jwt__Audience: AlonProjectUsers
      # Email is log-only here (no SMTP host), so users never receive the verification
      # link — disable the login gate. Set to true once a real SMTP sender is configured.
      Auth__RequireEmailVerification: ${REQUIRE_EMAIL_VERIFICATION:-false}
      # The browser reaches everything through nginx on the published WEB_PORT
      Cors__AllowedOrigins__0: "http://localhost:${WEB_PORT:-8080}"
      App__FrontendBaseUrl: "http://localhost:${WEB_PORT:-8080}"
      Geo__ContactEmail: ${GEO_CONTACT_EMAIL}
      # Email is optional — leave EMAIL_HOST empty to log verification links instead of sending
      Email__Host: ${EMAIL_HOST}
      Email__Port: ${EMAIL_PORT}
      Email__UseSsl: ${EMAIL_USE_SSL}
      Email__Username: ${EMAIL_USERNAME}
      Email__Password: ${EMAIL_PASSWORD}
      Email__From: ${EMAIL_FROM}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  mssql-data:
