# nginx serves the Angular SPA and reverse-proxies the API.
# The browser sees one origin (this server); /api is forwarded to the API
# container, so no CORS is involved in the deployed setup.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip for the JS/CSS bundles
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API → backend container (service name "api" on the compose network)
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: unknown routes serve index.html (Angular router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the hashed build assets
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
