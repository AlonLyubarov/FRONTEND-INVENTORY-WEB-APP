<app-modal title="New transaction" (closed)="closed.emit()">
  @if (serverError(); as error) {
    <p class="form-error" role="alert">{{ error }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <label class="field">
      <span class="field__label">Item</span>
      <select formControlName="itemId">
        <option [ngValue]="null" disabled>Select an item…</option>
        @for (item of items(); track item.id) {
          <option [ngValue]="item.id">{{ itemLabel(item) }}</option>
        }
      </select>
      @if (form.controls.itemId.touched && form.controls.itemId.invalid) {
        <div class="field__error">Item is required.</div>
      }
    </label>

    <div class="form-row">
      <label class="field">
        <span class="field__label">Type</span>
        <select formControlName="type">
          @for (type of transactionTypes; track type) {
            <option [ngValue]="type">{{ type }}</option>
          }
        </select>
      </label>

      <label class="field">
        <span class="field__label">Quantity</span>
        <input type="number" formControlName="quantity" min="1" step="1" />
        @if (form.controls.quantity.touched && form.controls.quantity.invalid) {
          <div class="field__error">Quantity must be greater than 0.</div>
        }
      </label>
    </div>

    <label class="field">
      <span class="field__label">Notes <span class="optional">(optional)</span></span>
      <textarea formControlName="notes" rows="2" placeholder="e.g. Weekly restock"></textarea>
    </label>

    <div class="modal-actions">
      <button type="button" class="btn btn--ghost" (click)="closed.emit()">Cancel</button>
      <button type="submit" class="btn" [disabled]="pending()">
        {{ pending() ? 'Recording…' : 'Record transaction' }}
      </button>
    </div>
  </form>
</app-modal>
