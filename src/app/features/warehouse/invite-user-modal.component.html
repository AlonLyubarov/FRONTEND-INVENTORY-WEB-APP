<app-modal [title]="'Invite user to “' + warehouse().name + '”'" (closed)="closed.emit()">
  <p class="text-muted" style="margin-top: 0">
    The invited user gets access to this main warehouse and all of its sub-warehouses.
  </p>

  @if (serverError(); as error) {
    <p class="form-error" role="alert">{{ error }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <label class="field">
      <span class="field__label">Username</span>
      <input type="text" formControlName="username" maxlength="50" />
      @if (form.controls.username.touched && form.controls.username.invalid) {
        <div class="field__error">
          @if (form.controls.username.hasError('required')) {
            Username is required.
          } @else {
            Username must be at most 50 characters.
          }
        </div>
      }
    </label>

    <label class="field">
      <span class="field__label">Email</span>
      <input type="email" formControlName="email" />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <div class="field__error">
          @if (form.controls.email.hasError('required')) {
            Email is required.
          } @else {
            Enter a valid email address.
          }
        </div>
      }
    </label>

    <div class="form-row">
      <label class="field">
        <span class="field__label">Temporary password</span>
        <input type="password" formControlName="password" autocomplete="new-password" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <div class="field__error">
            @if (form.controls.password.hasError('required')) {
              Password is required.
            } @else {
              Password must be at least 6 characters.
            }
          </div>
        }
      </label>

      <label class="field">
        <span class="field__label">Role</span>
        <select formControlName="role">
          @for (role of inviteRoles; track role) {
            <option [value]="role">{{ roleName(role) }}</option>
          }
        </select>
      </label>
    </div>

    <div class="modal-actions">
      <button type="button" class="btn btn--ghost" (click)="closed.emit()">Cancel</button>
      <button type="submit" class="btn" [disabled]="pending()">
        {{ pending() ? 'Inviting…' : 'Send invite' }}
      </button>
    </div>
  </form>
</app-modal>
